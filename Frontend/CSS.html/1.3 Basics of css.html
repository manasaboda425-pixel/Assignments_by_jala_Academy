
<!DOCTYPE html>
<html>

<head>
    <style>
        h1 {
            border-style: solid dashed dotted double;
            border-width: 4px 8px 6px 10px;
            border-color: crimson navy forestgreen goldenrod;
        }

        div {
            border-style: inset outset ridge groove;
            border-width: 5px;
            border-color: darkorange;
        }
    </style>
    <link rel="stylesheet" href="my_basics003.css">
</head>

<body>
    <h1>Heading with four different border sides</h1>

    <div>A div container with multiple border styles.</div>
</body>

</html>
