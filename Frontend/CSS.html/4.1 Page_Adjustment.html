
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hover Table Borders</title>
</head>

<body>
    <link rel="stylesheet" href="4.1 Page_Adjustment.css" />

    <table>
        <tr style="--rowCount: 0px">
            <td>Alpha</td>
            <td>Beta</td>
            <td>Gamma</td>
        </tr>
        <tr style="--rowCount: -1px">
            <td>Alpha</td>
            <td>Beta</td>
            <td>Gamma</td>
        </tr>
        <tr style="--rowCount: -2px">
            <td>Alpha</td>
            <td>Beta</td>
            <td>Gamma</td>
        </tr>
        <tr style="--rowCount: -3px">
            <td>Alpha</td>
            <td>Beta</td>
            <td>Gamma</td>
        </tr>
    </table>
</body>

</html>
