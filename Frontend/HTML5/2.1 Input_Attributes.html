
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Attributes Form</title>
</head>

<body>
    <h1>
        Demonstrating input attributes: text, password, submit, reset, radio, checkbox, button
    </h1>
    <br>

    <textarea></textarea>

    <textarea rows="5"></textarea>

    <textarea rows="5" cols="25"></textarea>
    <br><br>

    <form>
        <label for="passCode">Secret Password:</label><input type="password" id="passCode" />
    </form>
    <br>

    <input type="submit" /><br><br>

    <input type="reset" /><br><br>

    <input type="radio" name="shift" id="morning" /><label for="morning">Morning</label>

    <input type="radio" name="shift" id="evening" />
    <label for="evening">Evening</label>
    <br><br>

    <label><input type="checkbox" /> :Laptop</label><label><input type="checkbox" /> :Tablet</label>
    <br><br>

    <button>Send Data</button>
</body>

</html>
