
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML5 Inputs</title>
</head>

<body>
    <h1>
        Testing input types: number, range, color, date, file, time,
        month, week, email
    </h1>
    <form>
        <label for="rating">Rating (between 1 and 10):</label>
        <input type="number" id="rating" name="rating" min="1" max="10" />
    </form>
    <br />
    <form>
        <label for="brightness">Brightness (between 0 and 100):</label>
        <input type="range" id="brightness" name="brightness" min="0" max="100" />
    </form>
    <br />
    <form>
        <label for="themecolor">Choose a theme color:</label><input type="color" id="themecolor" name="themecolor" />
    </form>
    <br />
    <form>
        <label for="eventdate">Event Date:</label>
        <input type="date" id="eventdate" name="eventdate" />
    </form>
    <br />
    <form>
        <label for="uploaddoc">Upload document:</label>
        <input type="file" id="uploaddoc" name="uploaddoc" />
    </form>
    <br />
    <form>
        <label for="meeting">Schedule a time:</label>
        <input type="time" id="meeting" name="meeting" />
    </form>
    <br />
    <form>
        <label for="expmonth">Card Expiry (month and year):</label>
        <input type="month" id="expmonth" name="expmonth" />
    </form>
    <br />
    <form>
        <label for="vacation">Select vacation week:</label>
        <input type="week" id="vacation" name="vacation" />
    </form>
    <br />
    <form>
        <label for="contactEmail">Work email:</label>
        <input type="email" id="contactEmail" name="contactEmail" />
    </form>
    <br />
</body>

</html>
